<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Convertor</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container" id="container">
      <h1>Currency Convertor</h1>

      <div class="conversion-form">
        <form id="currency-form">
          <div class="from-amount">
            <label for="from-input">Amount :</label>
            <input
              type="number"
              id="from-input"
              placeholder="Enter Amount..."
              required
            />
          </div>

          <div class="convertor">
            <div class="from-container">
              <label for="from-dropdown">From</label>
              <select id="from-dropdown"></select>
            </div>

            <button type="submit" id="submit-btn">></button>

            <div class="to-container">
              <label for="to-dropdown">To</label>
              <select id="to-dropdown"></select>
            </div>
          </div>
        </form>

        <div class="converted-amount">
          <small>Converted</small>
          <h4><span id="converted">x USD = y USD</span></h4>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
